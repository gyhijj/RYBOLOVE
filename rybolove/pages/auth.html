<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация - РыбоLove</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="auth-container" style="max-width: 400px; margin: 50px auto;">
        <h2>Регистрация</h2>
        <form id="register-form">
            <input type="text" id="reg-name" placeholder="Имя" required />
            <input type="email" id="reg-email" placeholder="Email" required />
            <input type="password" id="reg-password" placeholder="Пароль" required />
            <button type="submit">Зарегистрироваться</button>
        </form>

        <h2>Вход</h2>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Email" required />
            <input type="password" id="login-password" placeholder="Пароль" required />
            <button type="submit">Войти</button>
        </form>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            const success = registerUser(name, email, password);
            if (success) {
                window.location.href = "profile.html";
            }
        });

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const success = loginUser(email, password);
            if (success) {
                window.location.href = "profile.html";
            }
        });
    </script>
</body>
</html>
